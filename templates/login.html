<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #fff5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(232, 126, 161, 0.15);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #e87ea1;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #c9a0b4;
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .flash {
            background: #ffe4ed;
            color: #e87ea1;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #c9a0b4;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f5c6d8;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            color: #4a4a4a;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #e87ea1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #e87ea1;
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #d96990;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: #c9a0b4;
        }

        .footer a {
            color: #e87ea1;
            font-weight: 700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌸 Welcome back</h1>
        <p class="subtitle">log in to see your habits</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="your username" autocomplete="off" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" />
            </div>
            <button type="submit">Log in</button>
        </form>

        <div class="footer">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>
</body>
</html>
